# efruze.muhammedtarikucar.com — bootstrap config (HTTP only)
#
# Bu dosya certbot çalışmadan ÖNCE kopyalanır. certbot --nginx çağırıldığında
# kendi SSL bloğunu otomatik ekler. Sonrasında bu dosyayı bir daha düzenlemiyoruz.

server {
    listen 80;
    listen [::]:80;
    server_name efruze.muhammedtarikucar.com;

    # ACME challenge — Let's Encrypt için
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Geri kalan trafiği container'a (henüz SSL yok; certbot SSL ekledikten
    # sonra otomatik 301 redirect ekleyecek).
    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        # Next.js statik asset cache
        proxy_read_timeout 60s;
    }

    # Next.js statik dosyaları için uzun cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Yüklemeler / büyük dosyalar
    client_max_body_size 30M;
}
