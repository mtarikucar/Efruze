services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://efruze.muhammedtarikucar.com}
    container_name: efruze_app
    restart: unless-stopped
    # Bind only to localhost; the host's native nginx terminates SSL and
    # reverse-proxies https://efruze.muhammedtarikucar.com → 127.0.0.1:3006.
    ports:
      - "127.0.0.1:3006:3000"
    volumes:
      # Persist admin-uploaded images across container rebuilds. Inside the
      # container they live under /app/public/uploads and are served by
      # Next.js static handling at /uploads/<file>.
      - efruze_uploads:/app/public/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://efruze:${POSTGRES_PASSWORD}@db:5432/efruze?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      # NextAuth runs behind nginx — `AUTH_TRUST_HOST` tells Auth.js it's
      # safe to honour the proxied Host header (https://efruze.muhammed…).
      # Without this it rejects every request as `UntrustedHost`.
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      AUTH_URL: ${NEXT_PUBLIC_SITE_URL:-https://efruze.muhammedtarikucar.com}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://efruze.muhammedtarikucar.com}
      # Optional integrations — populated from .env when configured, otherwise empty
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      PAYTR_TEST_MODE: ${PAYTR_TEST_MODE:-1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - efruze

  db:
    image: postgres:16-alpine
    container_name: efruze_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: efruze
      POSTGRES_USER: efruze
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - efruze_pg_data:/var/lib/postgresql/data
    # NOT exposing the DB to the host — only the app container reaches it via
    # the internal `efruze` network at hostname `db`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efruze -d efruze"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - efruze

volumes:
  efruze_pg_data:
    name: efruze_pg_data
  efruze_uploads:
    name: efruze_uploads

networks:
  efruze:
    name: efruze
    driver: bridge
